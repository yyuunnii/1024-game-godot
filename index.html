<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1024 Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: white; margin-bottom: 10px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #game-container { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 20px; }
        #score-board { display: flex; gap: 20px; margin-bottom: 15px; justify-content: center; }
        .score-box { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; color: white; font-size: 1.2em; }
        canvas { border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #controls { margin-top: 15px; color: rgba(255,255,255,0.8); text-align: center; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; text-align: center; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .modal h2 { margin-bottom: 20px; font-size: 2em; }
        .modal button { background: #667eea; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 8px; cursor: pointer; }
        .modal button:hover { background: #5a6fd6; }
        .win { color: #4caf50; } .lose { color: #f44336; }
    </style>
</head>
<body>
    <h1>1024</h1>
    <div id="game-container">
        <div id="score-board">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="score-box">Best: <span id="best">0</span></div>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
    </div>
    <div id="controls">Arrow keys / WASD to move • R to restart</div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 class="lose">Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="game.restart()">Try Again</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2 class="win">You Win!</h2>
            <p>You reached 1024!</p>
            <button onclick="game.continueGame()">Continue</button>
        </div>
    </div>

<script>
// 1024 Game - Complete Working Version with Animations
class Game {
    constructor() {
        this.canvas = document.getElementById('game');
        this.ctx = this.canvas.getContext('2d');
        this.grid = Array(4).fill(null).map(() => Array(4).fill(0));
        this.score = 0;
        this.best = parseInt(localStorage.getItem('best1024') || '0');
        this.won = false;
        this.canPlay = true;
        this.animating = false;
        
        this.colors = {
            0: '#cdc1b4', 2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
            32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
            512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
        };
        this.textColors = { 2: '#776e65', 4: '#776e65' };
        
        this.spawnAnimations = [];
        this.mergeAnimations = [];
        
        this.updateScore();
        this.spawnTile();
        this.spawnTile();
        this.draw();
        this.setupInput();
        this.loop();
    }
    
    loop() {
        this.updateAnimations();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
    
    updateScore() {
        document.getElementById('score').textContent = this.score;
        document.getElementById('best').textContent = Math.max(this.best, this.score);
    }
    
    spawnTile() {
        const empty = [];
        for (let x = 0; x < 4; x++) {
            for (let y = 0; y < 4; y++) {
                if (this.grid[x][y] === 0) empty.push({x, y});
            }
        }
        if (empty.length === 0) return;
        
        const pos = empty[Math.floor(Math.random() * empty.length)];
        const val = Math.random() > 0.9 ? 4 : 2;
        this.grid[pos.x][pos.y] = val;
        
        // Spawn animation
        this.spawnAnimations.push({
            x: pos.x, y: pos.y, value: val, scale: 0, progress: 0
        });
    }
    
    updateAnimations() {
        // Update spawn animations
        this.spawnAnimations = this.spawnAnimations.filter(anim => {
            anim.progress += 0.08;
            // Ease out back
            const t = Math.min(anim.progress, 1);
            const c1 = 1.70158, c3 = c1 + 1;
            anim.scale = 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
            return anim.progress < 1;
        });
        
        // Update merge animations
        this.mergeAnimations = this.mergeAnimations.filter(anim => {
            anim.progress += 0.1;
            const t = Math.min(anim.progress, 1);
            // Bounce effect
            if (t < 0.5) {
                anim.scale = 1 + t * 0.4;
            } else {
                anim.scale = 1.2 - (t - 0.5) * 0.4;
            }
            return anim.progress < 1;
        });
    }
    
    setupInput() {
        document.addEventListener('keydown', (e) => {
            if (!this.canPlay || this.animating) return;
            
            let moved = false;
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': moved = this.move(0, -1); break;
                case 'ArrowDown': case 's': case 'S': moved = this.move(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': moved = this.move(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': moved = this.move(1, 0); break;
                case 'r': case 'R': this.restart(); return;
            }
            
            if (moved) {
                e.preventDefault();
                this.animating = true;
                setTimeout(() => {
                    this.spawnTile();
                    this.animating = false;
                    this.checkWin();
                    this.checkGameOver();
                }, 150);
            }
        });
    }
    
    move(dx, dy) {
        let moved = false;
        const newGrid = this.grid.map(r => [...r]);
        
        if (dx === -1) {
            for (let y = 0; y < 4; y++) {
                let row = [];
                for (let x = 0; x < 4; x++) if (newGrid[x][y]) row.push(newGrid[x][y]);
                let merged = this.mergeLine(row);
                for (let x = 0; x < 4; x++) {
                    if (newGrid[x][y] !== merged[x]) moved = true;
                    newGrid[x][y] = merged[x];
                }
            }
        } else if (dx === 1) {
            for (let y = 0; y < 4; y++) {
                let row = [];
                for (let x = 3; x >= 0; x--) if (newGrid[x][y]) row.push(newGrid[x][y]);
                let merged = this.mergeLine(row);
                for (let x = 0; x < 4; x++) {
                    if (newGrid[3-x][y] !== merged[x]) moved = true;
                    newGrid[3-x][y] = merged[x];
                }
            }
        } else if (dy === -1) {
            for (let x = 0; x < 4; x++) {
                let col = [];
                for (let y = 0; y < 4; y++) if (newGrid[x][y]) col.push(newGrid[x][y]);
                let merged = this.mergeLine(col);
                for (let y = 0; y < 4; y++) {
                    if (newGrid[x][y] !== merged[y]) moved = true;
                    newGrid[x][y] = merged[y];
                }
            }
        } else if (dy === 1) {
            for (let x = 0; x < 4; x++) {
                let col = [];
                for (let y = 3; y >= 0; y--) if (newGrid[x][y]) col.push(newGrid[x][y]);
                let merged = this.mergeLine(col);
                for (let y = 0; y < 4; y++) {
                    if (newGrid[x][3-y] !== merged[y]) moved = true;
                    newGrid[x][3-y] = merged[y];
                }
            }
        }
        
        if (moved) {
            this.grid = newGrid;
            this.updateScore();
        }
        return moved;
    }
    
    mergeLine(line) {
        if (line.length === 0) return [0, 0, 0, 0];
        
        let result = [];
        let i = 0;
        while (i < line.length) {
            if (i + 1 < line.length && line[i] === line[i + 1]) {
                const merged = line[i] * 2;
                result.push(merged);
                this.score += merged;
                // Add merge animation
                this.mergeAnimations.push({ scale: 1, progress: 0 });
                i += 2;
            } else {
                result.push(line[i]);
                i++;
            }
        }
        
        while (result.length < 4) result.push(0);
        return result;
    }
    
    checkWin() {
        if (this.won) return;
        for (let x = 0; x < 4; x++) {
            for (let y = 0; y < 4; y++) {
                if (this.grid[x][y] === 1024) {
                    this.won = true;
                    document.getElementById('winModal').style.display = 'flex';
                    return;
                }
            }
        }
    }
    
    checkGameOver() {
        for (let x = 0; x < 4; x++) {
            for (let y = 0; y < 4; y++) {
                if (this.grid[x][y] === 0) return;
                if (x < 3 && this.grid[x][y] === this.grid[x+1][y]) return;
                if (y < 3 && this.grid[x][y] === this.grid[x][y+1]) return;
            }
        }
        
        if (this.score > this.best) {
            this.best = this.score;
            localStorage.setItem('best1024', this.best);
        }
        document.getElementById('finalScore').textContent = this.score;
        document.getElementById('gameOverModal').style.display = 'flex';
        this.canPlay = false;
    }
    
    restart() {
        this.grid = Array(4).fill(null).map(() => Array(4).fill(0));
        this.score = 0;
        this.won = false;
        this.canPlay = true;
        this.spawnAnimations = [];
        this.mergeAnimations = [];
        this.updateScore();
        document.getElementById('gameOverModal').style.display = 'none';
        document.getElementById('winModal').style.display = 'none';
        this.spawnTile();
        this.spawnTile();
    }
    
    continueGame() {
        document.getElementById('winModal').style.display = 'none';
    }
    
    draw() {
        const ctx = this.ctx;
        
        // Background
        ctx.fillStyle = '#bbada0';
        ctx.fillRect(0, 0, 400, 400);
        
        // Grid cells
        for (let x = 0; x < 4; x++) {
            for (let y = 0; y < 4; y++) {
                const px = 10 + x * 95;
                const py = 10 + y * 95;
                const value = this.grid[x][y];
                
                // Check for spawn animation
                const spawnAnim = this.spawnAnimations.find(a => a.x === x && a.y === y);
                const mergeAnim = this.mergeAnimations.length > 0 ? this.mergeAnimations[0] : null;
                
                let scale = 1;
                if (spawnAnim) scale = spawnAnim.scale;
                else if (mergeAnim && value > 0) scale = mergeAnim.scale;
                
                const size = 85 * scale;
                const offset = (85 - size) / 2;
                
                // Cell background
                ctx.fillStyle = this.colors[value] || '#edc22e';
                ctx.beginPath();
                ctx.roundRect(px + offset, py + offset, size, size, 6);
                ctx.fill();
                
                // Number
                if (value > 0) {
                    ctx.fillStyle = this.textColors[value] || '#f9f6f2';
                    ctx.font = `bold ${value >= 1000 ? 22 : value >= 100 ? 26 : 32}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(value, px + 42.5, py + 42.5);
                }
            }
        }
    }
}

const game = new Game();
</script>
</body>
</html>
